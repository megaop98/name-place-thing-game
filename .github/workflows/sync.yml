name: Sync to Hugging Face Hub

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Clean Binary Assets and Flatten History
        run: |
          # Remove the unwanted folder containing the images
          rm -rf attached_assets
          
          # Setup dummy git identity for the deployment worker
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Create a fresh, history-free branch containing only current code
          git checkout --orphan clean-deploy-branch
          git add -A
          git commit -m "Production release without binary assets"
          
          # Override the master branch locally with our clean code branch
          git branch -D master
          git branch -m master

      - name: Push Pure Code to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://SBD99:$HF_TOKEN@huggingface.co/spaces/SBD99/sbdgame master:main
