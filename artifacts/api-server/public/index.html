<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name, Place, Thing, Animal</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0d0d1a;
      --surface: #13132b;
      --surface2: #1a1a38;
      --border: #2a2a5a;
      --purple: #b44dff;
      --purple-dim: #7a1fcc;
      --cyan: #00e5ff;
      --cyan-dim: #0098aa;
      --text: #e8e8ff;
      --text-dim: #8888bb;
      --green: #00ff88;
      --red: #ff4466;
      --gold: #ffd700;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 1.5rem 1rem 0.5rem;
      background: linear-gradient(90deg, var(--purple), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 0 1rem 3rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }

    .card h2 {
      font-size: 1.1rem;
      color: var(--cyan);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input[type="text"]:focus { border-color: var(--purple); }
    input[type="text"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.7rem 1.4rem;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--cyan-dim));
      color: #fff;
    }
    .btn-cyan {
      background: linear-gradient(135deg, var(--cyan-dim), var(--cyan));
      color: #000;
    }
    .btn-green {
      background: linear-gradient(135deg, #00aa55, var(--green));
      color: #000;
    }
    .btn-gold {
      background: linear-gradient(135deg, #aa8800, var(--gold));
      color: #000;
    }
    .btn-red {
      background: linear-gradient(135deg, #aa1133, var(--red));
      color: #fff;
    }

    .join-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .join-row input { flex: 1; }

    #lobby-screen, #game-screen { display: none; }
    #lobby-screen.active, #game-screen.active { display: block; }

    .letter-display {
      text-align: center;
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.5rem 0 1rem;
      line-height: 1;
      filter: drop-shadow(0 0 20px var(--purple));
    }

    .round-info {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .game-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    .game-table th {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--cyan);
      font-size: 0.8rem;
      padding: 0.6rem;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .game-table td {
      border: 1px solid var(--border);
      padding: 0.5rem;
    }
    .game-table td input {
      border: none;
      background: transparent;
      padding: 0.3rem 0.4rem;
      width: 100%;
    }
    .game-table td input:focus { background: var(--surface2); }

    .action-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 0.5rem;
    }

    .countdown-bar-wrap {
      background: var(--surface2);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      margin: 0.75rem 0;
    }
    .countdown-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--purple));
      border-radius: 999px;
      transition: width 0.1s linear;
    }

    .countdown-label {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.25rem;
    }

    .players-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .player-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .player-chip.me { border-color: var(--purple); color: var(--purple); }
    .player-chip .chip-score {
      color: var(--cyan);
      font-weight: 700;
      font-size: 0.75rem;
    }

    .status-badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-waiting { background: var(--surface2); color: var(--text-dim); }
    .badge-active { background: #1a3a1a; color: var(--green); border: 1px solid var(--green); }
    .badge-countdown { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .results-table th {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--purple);
      padding: 0.55rem 0.7rem;
      text-align: left;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    .results-table td {
      border: 1px solid var(--border);
      padding: 0.55rem 0.7rem;
    }
    .results-table tr:nth-child(even) td { background: var(--surface2); }
    .score-pts { color: var(--green); font-weight: 700; }
    .total-pts { color: var(--cyan); font-weight: 700; }

    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 0.6rem;
    }
    .lb-rank { font-size: 1.5rem; font-weight: 900; min-width: 2rem; text-align: center; }
    .lb-rank.gold { color: var(--gold); }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-name { flex: 1; font-size: 1.05rem; font-weight: 600; }
    .lb-score { font-size: 1.3rem; font-weight: 800; color: var(--cyan); }
    .lb-me { border-color: var(--purple); }

    .notification {
      position: fixed;
      top: 1.2rem;
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      background: var(--surface);
      border: 1px solid var(--purple);
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 0 20px var(--purple-dim);
    }
    .notification.show { transform: translateX(-50%) translateY(0); }

    .glow-purple { box-shadow: 0 0 16px var(--purple-dim); }
    .glow-cyan { box-shadow: 0 0 16px var(--cyan-dim); }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.4rem; }
      .letter-display { font-size: 3.5rem; }
      .results-table { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div id="notification" class="notification"></div>

  <h1>Name, Place, Thing, Animal</h1>
  <p class="subtitle">Real-time multiplayer word game</p>

  <div class="container">

    <!-- JOIN SCREEN -->
    <div id="join-screen">
      <div class="card glow-purple">
        <h2>Join the Lobby</h2>
        <div class="join-row">
          <input id="nameInput" type="text" placeholder="Enter your name..." maxlength="20" />
          <button class="btn-primary" id="joinBtn" onclick="joinGame()">Join</button>
        </div>
      </div>
    </div>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen">
      <div class="card">
        <h2>Players <span id="statusBadge" class="status-badge badge-waiting">Waiting</span></h2>
        <div id="playersGrid" class="players-grid"></div>
      </div>

      <div class="card glow-cyan" id="gameCard">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
          <div>
            <div id="letterDisplay" class="letter-display">?</div>
            <div id="roundInfo" class="round-info">Press "Guess Alphabet" to start a round</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;">
            <button class="btn-cyan" id="guessBtn" onclick="guessAlphabet()">🎲 Guess Alphabet</button>
            <button class="btn-gold" id="leaderboardBtn" onclick="showLeaderboard()">🏆 Final Leaderboard</button>
          </div>
        </div>

        <div id="countdownSection" style="display:none;">
          <div id="countdownLabel" class="countdown-label"></div>
          <div class="countdown-bar-wrap">
            <div id="countdownBar" class="countdown-bar" style="width:100%"></div>
          </div>
        </div>
      </div>

      <div class="card" id="entryCard">
        <h2>Your Answers</h2>
        <table class="game-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Place</th>
              <th>Thing</th>
              <th>Animal</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input id="ans-name" type="text" placeholder="Name..." maxlength="50" /></td>
              <td><input id="ans-place" type="text" placeholder="Place..." maxlength="50" /></td>
              <td><input id="ans-thing" type="text" placeholder="Thing..." maxlength="50" /></td>
              <td><input id="ans-animal" type="text" placeholder="Animal..." maxlength="50" /></td>
            </tr>
          </tbody>
        </table>
        <div class="action-row">
          <button class="btn-green" id="finishBtn" onclick="finishRow()" disabled>✅ Finish Row</button>
          <span id="entryStatus" style="color:var(--text-dim);font-size:0.85rem;"></span>
        </div>
      </div>

      <!-- RESULTS SECTION -->
      <div class="card" id="resultsCard" style="display:none;">
        <h2>Round Results</h2>
        <div id="resultsContent"></div>
      </div>

      <!-- LEADERBOARD SECTION -->
      <div class="card" id="leaderboardCard" style="display:none;">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboardContent"></div>
      </div>

    </div><!-- end lobby-screen -->
  </div>

  <script>
    const socket = io({ path: '/socket.io' });

    let myId = null;
    let roundActive = false;
    let countdownActive = false;
    let countdownEndsAt = null;
    let countdownInterval = null;
    let hasFinished = false;
    let gameStarted = false;

    // --- UI HELPERS ---
    function show(id) { document.getElementById(id).style.display = ''; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
    function showBlock(id) { document.getElementById(id).style.display = 'block'; }
    function el(id) { return document.getElementById(id); }

    function notify(msg, duration = 3000) {
      const n = el('notification');
      n.textContent = msg;
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), duration);
    }

    function updateStatusBadge() {
      const badge = el('statusBadge');
      if (countdownActive) {
        badge.className = 'status-badge badge-countdown';
        badge.textContent = 'Countdown!';
      } else if (roundActive) {
        badge.className = 'status-badge badge-active';
        badge.textContent = 'Round Active';
      } else {
        badge.className = 'status-badge badge-waiting';
        badge.textContent = gameStarted ? 'Between Rounds' : 'Waiting';
      }
    }

    function renderPlayers(players) {
      const grid = el('playersGrid');
      grid.innerHTML = players.map(p => {
        const isMe = p.id === myId;
        return `<div class="player-chip ${isMe ? 'me' : ''}">
          ${isMe ? '👤 ' : ''}${escapeHtml(p.name)}
          <span class="chip-score">${p.score}pt${p.score !== 1 ? 's' : ''}</span>
        </div>`;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setAnswersDisabled(disabled) {
      ['ans-name', 'ans-place', 'ans-thing', 'ans-animal'].forEach(id => {
        el(id).disabled = disabled;
      });
    }

    function clearAnswers() {
      ['ans-name', 'ans-place', 'ans-thing', 'ans-animal'].forEach(id => {
        el(id).value = '';
      });
    }

    function getEntry() {
      return {
        name: el('ans-name').value,
        place: el('ans-place').value,
        thing: el('ans-thing').value,
        animal: el('ans-animal').value,
      };
    }

    // --- COUNTDOWN ---
    function startCountdownUI(endsAt) {
      countdownEndsAt = endsAt;
      countdownActive = true;
      showBlock('countdownSection');
      updateStatusBadge();

      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        const remaining = Math.max(0, countdownEndsAt - Date.now());
        const pct = (remaining / 7000) * 100;
        el('countdownBar').style.width = pct + '%';
        el('countdownLabel').textContent = `⏱ Round ends in ${(remaining / 1000).toFixed(1)}s`;
        if (remaining <= 0) {
          clearInterval(countdownInterval);
        }
      }, 100);
    }

    function stopCountdownUI() {
      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = null;
      countdownActive = false;
      hide('countdownSection');
      updateStatusBadge();
    }

    // --- ACTIONS ---
    function joinGame() {
      const name = el('nameInput').value.trim();
      if (!name) { notify('Please enter your name!'); return; }
      socket.emit('join', name);
    }

    function guessAlphabet() {
      if (roundActive || countdownActive) {
        notify('A round is already in progress!');
        return;
      }
      socket.emit('guess_alphabet');
    }

    function finishRow() {
      const entry = getEntry();
      if (roundActive && !countdownActive) {
        socket.emit('finish_row', entry);
        hasFinished = true;
        el('finishBtn').disabled = true;
        el('finishBtn').textContent = '✅ Submitted';
        el('entryStatus').textContent = 'Waiting for countdown...';
        setAnswersDisabled(true);
      } else if (countdownActive) {
        socket.emit('submit_entry', entry);
        hasFinished = true;
        el('finishBtn').disabled = true;
        el('finishBtn').textContent = '✅ Submitted';
        el('entryStatus').textContent = 'Answers saved!';
        setAnswersDisabled(true);
      }
    }

    function showLeaderboard() {
      socket.emit('final_leaderboard');
    }

    // --- SOCKET EVENTS ---
    socket.on('joined', (data) => {
      myId = data.playerId;
      roundActive = data.roundActive;
      countdownActive = data.countdownActive;
      gameStarted = data.gameStarted;

      hide('join-screen');
      el('lobby-screen').classList.add('active');
      showBlock('lobby-screen');

      renderPlayers(data.players);
      updateStatusBadge();

      if (data.currentLetter) {
        el('letterDisplay').textContent = data.currentLetter;
        el('roundInfo').textContent = `Round ${data.roundNumber}`;
      }

      if (data.countdownActive && data.countdownEndsAt) {
        startCountdownUI(data.countdownEndsAt);
      }

      if (roundActive && !hasFinished) {
        el('finishBtn').disabled = false;
        setAnswersDisabled(false);
      }
    });

    socket.on('players_update', (players) => {
      renderPlayers(players);
    });

    socket.on('round_started', (data) => {
      roundActive = true;
      countdownActive = false;
      hasFinished = false;
      gameStarted = true;

      el('letterDisplay').textContent = data.letter;
      el('letterDisplay').style.filter = `drop-shadow(0 0 30px var(--purple))`;
      el('roundInfo').textContent = `Round ${data.roundNumber} — Fill in your answers!`;

      clearAnswers();
      setAnswersDisabled(false);
      el('finishBtn').disabled = false;
      el('finishBtn').textContent = '✅ Finish Row';
      el('entryStatus').textContent = '';
      el('guessBtn').disabled = true;
      stopCountdownUI();
      hide('resultsCard');
      hide('leaderboardCard');
      updateStatusBadge();

      notify(`✨ Round ${data.roundNumber} started! Letter: ${data.letter}`);
    });

    socket.on('countdown_started', (data) => {
      startCountdownUI(data.endsAt);
      notify(`⏱ ${data.triggeredBy} finished! 7 seconds remaining!`, 4000);

      if (!hasFinished) {
        el('finishBtn').disabled = false;
        el('finishBtn').textContent = '⚡ Submit Now';
      }
    });

    socket.on('round_results', (data) => {
      roundActive = false;
      countdownActive = false;
      stopCountdownUI();
      el('guessBtn').disabled = false;
      el('finishBtn').disabled = true;
      el('finishBtn').textContent = '✅ Finish Row';
      el('entryStatus').textContent = '';
      setAnswersDisabled(true);
      updateStatusBadge();
      renderPlayers(data.players);

      const card = el('resultsCard');
      const content = el('resultsContent');
      showBlock('resultsCard');

      let html = `<table class="results-table"><thead><tr>
        <th>Player</th>
        <th>Name</th>
        <th>Place</th>
        <th>Thing</th>
        <th>Animal</th>
        <th>Round +</th>
        <th>Total</th>
      </tr></thead><tbody>`;

      for (const r of data.results) {
        const isMe = r.playerId === myId;
        html += `<tr style="${isMe ? 'background:rgba(180,77,255,0.08);' : ''}">
          <td>${escapeHtml(r.playerName)}${isMe ? ' <span style="color:var(--purple);font-size:0.75rem">(you)</span>' : ''}</td>
          <td>${escapeHtml(r.entry.name || '—')}</td>
          <td>${escapeHtml(r.entry.place || '—')}</td>
          <td>${escapeHtml(r.entry.thing || '—')}</td>
          <td>${escapeHtml(r.entry.animal || '—')}</td>
          <td class="score-pts">+${r.roundScore}</td>
          <td class="total-pts">${r.totalScore}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      content.innerHTML = html;

      notify('🎉 Round over! Scores updated!');
    });

    socket.on('show_leaderboard', (players) => {
      showBlock('leaderboardCard');
      const content = el('leaderboardContent');
      const rankIcons = ['🥇', '🥈', '🥉'];
      const rankClass = ['gold', 'silver', 'bronze'];

      let html = players.map((p, i) => {
        const isMe = p.id === myId;
        const icon = rankIcons[i] || `#${i + 1}`;
        const cls = rankClass[i] || '';
        return `<div class="leaderboard-item ${isMe ? 'lb-me' : ''}">
          <div class="lb-rank ${cls}">${icon}</div>
          <div class="lb-name">${escapeHtml(p.name)}${isMe ? ' <span style="color:var(--purple);font-size:0.8rem">(you)</span>' : ''}</div>
          <div class="lb-score">${p.score} pts</div>
        </div>`;
      }).join('');

      content.innerHTML = html || '<p style="color:var(--text-dim)">No players yet.</p>';
      el('leaderboardCard').scrollIntoView({ behavior: 'smooth' });
    });

    socket.on('connect_error', () => {
      notify('⚠️ Connection error. Retrying...', 5000);
    });

    // Enter key to join
    el('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinGame();
    });
  </script>
</body>
</html>
