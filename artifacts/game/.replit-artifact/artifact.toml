kind = "web"
previewPath = "/"
title = "Name Place Thing Animal"
version = "1.0.0"
id = "artifacts/game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24631
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/game run dev"

[services.env]
PORT = "24631"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/game", "run", "build"]
publicDir = "artifacts/game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
